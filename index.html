<title>Fitness — All Apps</title>
<style>
  :root{
    --bg:#F2F1EA;
    --card:#FFFFFF;
    --elevated:#FBFAF4;
    --ink:#141414;
    --ink-dim:#8A8A85;
    --lime:#D7F239;
    --lime-dim:#BFDD2E;
    --line:#141414;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overscroll-behavior-y:none;
  }
  header.top{
    padding:calc(28px + env(safe-area-inset-top)) 20px 20px;
    text-align:center;
  }
  header.top h1{
    margin:0; font-size:26px; font-weight:800; letter-spacing:-0.5px; text-transform:uppercase;
  }
  header.top p{
    margin:6px 0 0; font-size:13px; color:var(--ink-dim);
  }

  main{padding:8px 20px 40px; max-width:520px; margin:0 auto;}

  a.app-card{
    display:flex; align-items:center; gap:16px;
    background:var(--card); border:1.5px solid var(--line); border-radius:16px;
    padding:18px; margin-bottom:16px; text-decoration:none; color:var(--ink);
  }
  a.app-card:active{background:var(--elevated);}
  .app-icon{
    width:56px; height:56px; border-radius:14px; flex-shrink:0;
    border:1.5px solid var(--ink);
  }
  .app-text{flex:1;}
  .app-text .name{font-size:17px; font-weight:800; margin-bottom:3px;}
  .app-text .desc{font-size:12px; color:var(--ink-dim); line-height:1.4;}
  .app-arrow{font-size:20px; color:var(--ink-dim); flex-shrink:0;}

  footer{text-align:center; font-size:11px; color:var(--ink-dim); padding:20px 0 10px;}
</style>
</head>
